<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przeglądarka Ximi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #202124;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .browser-bar {
            background: #35363a;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .nav-btns {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: 0.2s;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        .address-bar {
            flex: 1;
            background: #202124;
            border-radius: 20px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid transparent;
        }

        .address-bar:focus-within {
            border-color: #3498db;
        }

        .address-bar input {
            background: none;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .browser-content {
            flex: 1;
            background: white;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .home-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .close-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="browser-bar">
        <div class="nav-btns">
            <button class="nav-btn" onclick="history.back()">←</button>
            <button class="nav-btn" onclick="history.forward()">→</button>
            <button class="nav-btn" onclick="location.reload()">↻</button>
        </div>
        
        <button class="home-btn" onclick="goHome()">🏠</button>

        <div class="address-bar">
            <span>🔒</span>
            <input type="text" id="url-input" value="https://www.google.com/webhp?igu=1" onkeydown="handleUrl(event)">
        </div>

        <button class="close-btn" onclick="window.location.href='pulpit.html'">Zamknij</button>
    </div>

    <div class="browser-content">
        <!-- Uwaga: Używamy parametru igu=1 dla Google, aby pozwolić na wyświetlanie w iframe -->
        <iframe id="browser-frame" src="https://www.google.com/webhp?igu=1"></iframe>
    </div>

    <script>
        function handleUrl(e) {
            if (e.key === 'Enter') {
                let url = document.getElementById('url-input').value;
                if (!url.startsWith('http')) {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url) + '&igu=1';
                }
                document.getElementById('browser-frame').src = url;
            }
        }

        function goHome() {
            const home = "https://www.google.com/webhp?igu=1";
            document.getElementById('url-input').value = home;
            document.getElementById('browser-frame').src = home;
        }
    </script>
</body>
</html>
