<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS Web Edition</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            color: white;
        }

        /* EKRAN 1: ŁADOWANIE */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .os-name {
            font-size: 64px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .loader-bar-container {
            width: 300px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
        }

        #loader-bar {
            width: 0%;
            height: 100%;
            background: #3498db;
            transition: width 0.1s linear;
        }

        /* EKRAN 2: ANIMACJA I PRZYCISK */
        #animation-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: none; /* Ukryty na początku */
            justify-content: center;
            align-items: center;
            z-index: 50;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(2px);
            animation: float 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        #continue-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid white;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 200;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        #continue-btn:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <!-- EKRAN 1: ŁADOWANIE -->
    <div id="loading-screen">
        <div class="os-name">BootOS</div>
        <div class="loader-bar-container">
            <div id="loader-bar"></div>
        </div>
    </div>

    <!-- EKRAN 2: ANIMACJA BĄBELKÓW I PRZYCISK -->
    <div id="animation-screen">
        <!-- Bąbelki zostaną dodane przez JS -->
        <button id="continue-btn" onclick="continueOS()">Kontynuuj</button>
    </div>

    <script>
        // FUNKCJA ŁADOWANIA
        function startLoading() {
            let progress = 0;
            const bar = document.getElementById('loader-bar');
            const duration = 4000; // 4 sekundy ładowania
            const interval = 50;
            const step = (interval / duration) * 100;

            const loading = setInterval(() => {
                progress += step;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(loading);
                    showAnimation();
                }
                bar.style.width = progress + '%';
            }, interval);
        }

        // PRZEJŚCIE DO ANIMACJI
        function showAnimation() {
            document.getElementById('loading-screen').style.display = 'none';
            const animScreen = document.getElementById('animation-screen');
            animScreen.style.display = 'flex';
            
            createBubbles();
        }

        // TWORZENIE BĄBELKÓW
        function createBubbles() {
            const screen = document.getElementById('animation-screen');
            const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];
            
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const size = Math.random() * 60 + 20 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                bubble.style.animationDelay = Math.random() * 8 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                
                screen.appendChild(bubble);
            }
        }

        // PRZYCISK KONTYNUUJ - PRZENOSI DO jezyk.html
        function continueOS() {
            window.location.href = "jezyk.html";
        }

        // URUCHOM START
        window.onload = startLoading;
    </script>
</body>
</html>
