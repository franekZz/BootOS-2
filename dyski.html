<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS - Zarządzanie Dyskami</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            color: #333;
        }

        /* TŁO Z BĄBELKAMI */
        #animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(2px);
            animation: float 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .toolbar {
            background-color: #ecf0f1;
            padding: 10px 20px;
            border-bottom: 1px solid #bdc3c7;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 15px;
            border: 1px solid #bdc3c7;
            background: white;
            cursor: pointer;
            border-radius: 3px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #e1e1e1;
        }

        .btn:disabled {
            color: #aaa;
            cursor: not-allowed;
        }

        .btn.format-btn {
            color: #e74c3c;
            font-weight: bold;
        }

        .btn.format-btn:hover:not(:disabled) {
            background: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        .container {
            padding: 30px;
        }

        .disk-item {
            width: 300px;
            background: white;
            border: 2px solid transparent;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .disk-item:hover {
            transform: translateY(-5px);
            border-color: #3498db;
        }

        .disk-item.selected {
            border-color: #3498db;
            background-color: #ebf5fb;
        }

        .disk-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .disk-info {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .progress-container {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-bar {
            height: 100%;
            width: 95%;
            background: #e74c3c; /* Czerwony pasek na początku */
            transition: width 1s ease, background-color 0.5s;
        }

        .status-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        /* Modal formatowania i partycjonowania */
        #format-overlay, #partition-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: white;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .modal-box {
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #34495e;
            background: #1a252f;
            color: white;
            box-sizing: border-box;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btns button {
            flex: 1;
            padding: 10px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-confirm { background: #3498db; color: white; }
        .btn-cancel { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div id="animation-background"></div>

    <div class="header">
        <span>BootOS - Konfiguracja Dyskowa</span>
        <span id="user-display">Użytkownik</span>
    </div>

    <div class="toolbar">
        <button class="btn" onclick="location.reload()">Odśwież</button>
        <button id="btn-split" class="btn" disabled onclick="splitDisk()">Rozdziel na partycje</button>
        <button id="btn-format" class="btn format-btn" disabled onclick="startFormat()">Formatuj</button>
        <button class="btn" onclick="location.href='login.html'">Wyloguj</button>
    </div>

    <div class="container">
        <h3>Dyski i partycje</h3>
        
        <div id="disk-list" style="display: flex; gap: 20px; flex-wrap: wrap;">
            <div id="disk-c" class="disk-item" onclick="selectDisk('disk-c')">
                <div class="disk-icon">💽</div>
                <div class="disk-info"><strong>Dysk Lokalny (C:)</strong></div>
                <div class="progress-container">
                    <div id="c-progress" class="progress-bar"></div>
                </div>
                <div id="c-status" class="status-text">95% zajęte (10 GB wolnych z 200 GB)</div>
            </div>
        </div>
    </div>

    <div id="partition-overlay">
        <div class="modal-box">
            <h3>Nowa partycja</h3>
            <div class="input-group">
                <label>Nazwa dysku:</label>
                <input type="text" id="part-name" value="Dysk Lokalny">
            </div>
            <div class="input-group">
                <label>Litera dysku:</label>
                <select id="part-letter">
                    <option value="D">D:</option>
                    <option value="E">E:</option>
                    <option value="F">F:</option>
                    <option value="G">G:</option>
                </select>
            </div>
            <div class="input-group">
                <label>Rozmiar (GB):</label>
                <input type="number" id="part-size" value="100" min="1" max="190">
            </div>
            <div class="modal-btns">
                <button class="btn-confirm" onclick="confirmSplit()">Utwórz</button>
                <button class="btn-cancel" onclick="document.getElementById('partition-overlay').style.display='none'">Anuluj</button>
            </div>
        </div>
    </div>

    <div id="format-overlay">
        <div>
            <h2>Formatowanie dysku C:...</h2>
            <p>Proszę czekać, usuwanie danych...</p>
            <div class="progress-container" style="width: 400px; margin: 20px auto;">
                <div id="format-progress" class="progress-bar" style="width: 0%; background-color: #3498db;"></div>
            </div>
        </div>
    </div>

    <script>
        // TWORZENIE BĄBELKÓW
        function createBubbles() {
            const screen = document.getElementById('animation-background');
            const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];
            
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const size = Math.random() * 60 + 20 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                bubble.style.animationDelay = Math.random() * 8 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                
                screen.appendChild(bubble);
            }
        }

        // Pobierz nazwę użytkownika z parametrów URL (opcjonalnie)
        const urlParams = new URLSearchParams(window.location.search);
        const user = urlParams.get('user') || 'Użytkownik';
        document.getElementById('user-display').innerText = user;

        let selectedDiskId = null;
        let isSplit = false;

        function selectDisk(id) {
            const disks = document.querySelectorAll('.disk-item');
            const formatBtn = document.getElementById('btn-format');
            const splitBtn = document.getElementById('btn-split');
            
            disks.forEach(d => d.classList.remove('selected'));
            
            if (selectedDiskId === id) {
                selectedDiskId = null;
                formatBtn.disabled = true;
                splitBtn.disabled = true;
            } else {
                selectedDiskId = id;
                document.getElementById(id).classList.add('selected');
                formatBtn.disabled = false;
                // Można dzielić tylko dysk C i tylko raz
                splitBtn.disabled = (id !== 'disk-c' || isSplit);
            }
        }

        function splitDisk() {
            if (isSplit) return;
            document.getElementById('partition-overlay').style.display = 'flex';
        }

        function confirmSplit() {
            const name = document.getElementById('part-name').value;
            const letter = document.getElementById('part-letter').value;
            const size = parseInt(document.getElementById('part-size').value);

            if (size < 1 || size > 190) {
                alert('Rozmiar musi być między 1 a 190 GB.');
                return;
            }

            const diskList = document.getElementById('disk-list');
            const cStatus = document.getElementById('c-status');
            const cBar = document.getElementById('c-progress');
            
            isSplit = true;
            document.getElementById('partition-overlay').style.display = 'none';

            // Aktualizacja dysku C (200GB - nowy rozmiar)
            const remainingSize = 200 - size;
            cStatus.innerText = `95% zajęte (wolne miejsce na ${remainingSize} GB)`;
            
            // Dodanie nowego dysku
            const diskId = 'disk-' + letter.toLowerCase();
            const newDisk = document.createElement('div');
            newDisk.id = diskId;
            newDisk.className = 'disk-item';
            newDisk.onclick = () => selectDisk(diskId);
            newDisk.innerHTML = `
                <div class="disk-icon">💽</div>
                <div class="disk-info"><strong>${name} (${letter}:)</strong></div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: 0%; background-color: #2ecc71;"></div>
                </div>
                <div class="status-text">0% zajęte (${size} GB wolnych z ${size} GB)</div>
            `;
            
            diskList.appendChild(newDisk);
            document.getElementById('btn-split').disabled = true;
            alert(`Pomyślnie utworzono partycję ${letter}: (${name}) o rozmiarze ${size} GB.`);
        }

        function startFormat() {
            if (!selectedDiskId) return;
            const diskElement = document.getElementById(selectedDiskId);
            const diskLabel = diskElement.querySelector('strong').innerText;
            
            if (!confirm(`OSTRZEŻENIE: Formatowanie usunie wszystkie dane z ${diskLabel}. Kontynuować?`)) {
                return;
            }

            const overlay = document.getElementById('format-overlay');
            const formatBar = document.getElementById('format-progress');
            
            overlay.querySelector('h2').innerText = `Formatowanie ${diskLabel}...`;
            overlay.style.display = 'flex';
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 2;
                formatBar.style.width = progress + '%';
                
                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        
                        const bar = diskElement.querySelector('.progress-bar');
                        const status = diskElement.querySelector('.status-text');
                        
                        // Wyciąganie rozmiaru z tekstu (uproszczone)
                        let totalSize = "100 GB";
                        if (selectedDiskId === 'disk-c') {
                            totalSize = isSplit ? (200 - parseInt(document.getElementById('part-size').value)) + " GB" : "200 GB";
                        } else {
                            totalSize = document.getElementById('part-size').value + " GB";
                        }

                        bar.style.width = '2%';
                        bar.style.backgroundColor = '#2ecc71';
                        status.innerText = `2% zajęte (${totalSize} wolnych)`;
                        
                        alert(`Formatowanie ${diskLabel} zakończone!`);
                    }, 500);
                }
            }, 50);
        }

        // URUCHOM BĄBELKI
        window.onload = createBubbles;
    </script>
</body>
</html>
