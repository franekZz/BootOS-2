<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BinaryOS - Premium Desktop</title>
    <style>
        :root {
            --primary: #9c27b0;
            --primary-dark: #7b1fa2;
            --accent: #e040fb;
            --bg-glass: rgba(25, 10, 40, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2e004d 0%, #1a0033 100%);
            color: white;
        }

        /* Lock Screen */
        #lockscreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #1a0033, #4a0080);
            z-index: 999999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }
        #ls-time { font-size: 80px; margin-bottom: 10px; }
        #ls-date { font-size: 20px; opacity: 0.7; margin-bottom: 50px; }
        .ls-login-box { display: none; flex-direction: column; align-items: center; gap: 15px; }

        /* Bubbles */
        .bubbles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; pointer-events: none;
        }
        .bubble {
            position: absolute; border-radius: 50%;
            background: linear-gradient(45deg, rgba(156, 39, 176, 0.3), rgba(224, 64, 251, 0.2));
            filter: blur(30px); animation: float 15s infinite alternate ease-in-out;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, -100px) scale(1.2); }
        }

        /* Desktop */
        #desktop {
            position: relative; width: 100%; height: calc(100% - 50px);
            z-index: 1; padding: 20px; box-sizing: border-box;
        }

        .icon {
            width: 80px; height: 90px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            cursor: pointer; border-radius: 8px; transition: 0.2s;
            position: absolute; user-select: none;
        }
        .icon:hover { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); }
        .icon-img { font-size: 40px; margin-bottom: 5px; }
        .icon-text { font-size: 12px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* Selection Box */
        #selection-box {
            position: fixed; border: 1px solid rgba(156, 39, 176, 0.5);
            background: rgba(156, 39, 176, 0.1); display: none; z-index: 10000;
        }

        /* Taskbar */
        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 50px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(20px);
            display: flex; justify-content: center; align-items: center; z-index: 5000;
        }
        .tb-icon {
            width: 40px; height: 40px; margin: 0 5px; display: flex;
            align-items: center; justify-content: center; font-size: 24px;
            cursor: pointer; border-radius: 8px; transition: 0.2s;
        }
        .tb-icon:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-3px); }

        /* Windows */
        .window {
            position: fixed; background: var(--bg-glass); backdrop-filter: blur(30px);
            border: 1px solid var(--border-glass); border-radius: 15px;
            display: none; flex-direction: column; z-index: 1000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden;
        }
        .win-header {
            padding: 10px 15px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(255, 255, 255, 0.05); cursor: move;
        }
        .win-controls { display: flex; gap: 8px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; border: none; }
        .win-close { background: #ff5f56; }
        .win-content { flex: 1; padding: 20px; overflow-y: auto; }

        /* Context Menu */
        #context-menu {
            position: fixed; background: var(--bg-glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass); border-radius: 10px;
            width: 200px; display: none; flex-direction: column; padding: 5px;
            z-index: 20000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .cm-item {
            padding: 8px 12px; border-radius: 6px; cursor: pointer;
            font-size: 13px; transition: 0.2s;
        }
        .cm-item:hover { background: rgba(255, 255, 255, 0.1); }

        /* Fake Cursor */
        #fake-cursor {
            position: fixed; width: 20px; height: 20px; background: white;
            border-radius: 50%; z-index: 99999; pointer-events: none;
            box-shadow: 0 0 10px white; display: none;
        }
    </style>
</head>
<body oncontextmenu="openContextMenu(event)">
    <!-- Lock Screen -->
    <div id="lockscreen">
        <div id="ls-time">12:00</div>
        <div id="ls-date">Friday, April 10</div>
        
        <div class="ls-login-box" id="ls-login">
            <div style="width:80px; height:80px; background:rgba(255,255,255,0.1); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:40px;">👤</div>
            <div id="ls-username" style="font-size:24px;">User</div>
            <input type="password" id="ls-pass-input" placeholder="Password" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); padding:10px 20px; border-radius:20px; color:white; text-align:center; outline:none;">
            <button onclick="unlock()" style="background:var(--primary); border:none; color:white; padding:8px 25px; border-radius:15px; cursor:pointer;">Unlock</button>
        </div>
        <div id="ls-hint" style="position:absolute; bottom:30px; opacity:0.6;">Click to unlock</div>
    </div>

    <div class="bubbles" id="bubble-container"></div>
    <div id="fake-cursor"></div>
    <div id="selection-box"></div>

    <!-- Desktop -->
    <div id="desktop" onmousedown="startSelection(event)">
        <div class="icon" style="top: 30px; left: 30px;" ondblclick="openApp('explorer')">
            <div class="icon-img">📂</div><div class="icon-text">Explorer</div>
        </div>
        <div class="icon" style="top: 30px; left: 130px;" ondblclick="openApp('tera')">
            <div class="icon-img">✨</div><div class="icon-text">Tera AI</div>
        </div>
        <div class="icon" style="top: 140px; left: 30px;" ondblclick="openApp('settings')">
            <div class="icon-img">⚙️</div><div class="icon-text">Settings</div>
        </div>
    </div>

    <!-- Taskbar -->
    <div id="taskbar">
        <div class="tb-icon" onclick="toggleStart()">🟣</div>
        <div class="tb-icon" onclick="openApp('explorer')">📂</div>
        <div class="tb-icon" onclick="openApp('tera')">✨</div>
        <div class="tb-icon" onclick="openApp('settings')">⚙️</div>
    </div>

    <!-- Windows -->
    <div id="win-explorer" class="window" style="width: 600px; height: 400px; top: 15%; left: 20%;">
        <div class="win-header" onmousedown="dragWindow(event, 'win-explorer')">
            <span>📂 Explorer</span>
            <div class="win-controls"><button class="win-btn win-close" onclick="closeApp('explorer')"></button></div>
        </div>
        <div class="win-content">Welcome to BinaryOS Explorer.</div>
    </div>

    <div id="win-tera" class="window" style="width: 500px; height: 600px; top: 10%; left: 30%;">
        <div class="win-header" onmousedown="dragWindow(event, 'win-tera')">
            <span>✨ Tera AI</span>
            <div class="win-controls"><button class="win-btn win-close" onclick="closeApp('tera')"></button></div>
        </div>
        <div class="win-content">Tera AI is ready.</div>
    </div>

    <div id="win-settings" class="window" style="width: 650px; height: 450px; top: 20%; left: 25%;">
        <div class="win-header" onmousedown="dragWindow(event, 'win-settings')">
            <span>⚙️ Settings</span>
            <div class="win-controls"><button class="win-btn win-close" onclick="closeApp('settings')"></button></div>
        </div>
        <div class="win-content">Settings loaded.</div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu">
        <div class="cm-item" onclick="location.reload()">Refresh</div>
        <div class="cm-item" onclick="openApp('settings')">Settings</div>
    </div>

    <script>
        // Window Dragging Logic (Fixed)
        let activeWin = null, offX, offY;
        function dragWindow(e, id) {
            activeWin = document.getElementById(id);
            // Z-Index Management
            document.querySelectorAll('.window').forEach(w => w.style.zIndex = "1000");
            activeWin.style.zIndex = "1001";
            
            offX = e.clientX - activeWin.offsetLeft;
            offY = e.clientY - activeWin.offsetTop;
            
            function onMouseMove(me) {
                if (!activeWin) return;
                activeWin.style.left = (me.clientX - offX) + 'px';
                activeWin.style.top = (me.clientY - offY) + 'px';
            }
            
            function onMouseUp() {
                activeWin = null;
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            }
            
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        }

        function openApp(id) {
            const win = document.getElementById('win-' + id);
            if(win) {
                win.style.display = 'flex';
                document.querySelectorAll('.window').forEach(w => w.style.zIndex = "1000");
                win.style.zIndex = "1001";
            }
        }
        function closeApp(id) { document.getElementById('win-' + id).style.display = 'none'; }
        function toggleStart() { alert("Start Menu - BinaryOS"); }

        // Lock Screen Logic
        function updateTime() {
            const now = new Date();
            document.getElementById('ls-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000); updateTime();

        const ls = document.getElementById('lockscreen');
        const lsLogin = document.getElementById('ls-login');
        const lsHint = document.getElementById('ls-hint');
        
        ls.onclick = () => {
            const savedPass = localStorage.getItem('pc_password');
            if (savedPass && savedPass !== "") {
                lsLogin.style.display = 'flex';
                lsHint.style.display = 'none';
            } else {
                unlock();
            }
        };

        function unlock() {
            const savedPass = localStorage.getItem('pc_password');
            const inputPass = document.getElementById('ls-pass-input').value;
            if (!savedPass || savedPass === "" || inputPass === savedPass) {
                ls.style.transform = 'translateY(-100%)';
                setTimeout(() => ls.style.display = 'none', 800);
            } else {
                alert("Incorrect password!");
            }
        }

        // Context Menu
        function openContextMenu(e) {
            e.preventDefault();
            const cm = document.getElementById('context-menu');
            cm.style.display = 'flex'; cm.style.left = e.pageX + 'px'; cm.style.top = e.pageY + 'px';
        }
        window.onclick = () => document.getElementById('context-menu').style.display = 'none';

        // Selection Box
        let isSelecting = false, startX, startY;
        function startSelection(e) {
            if (e.target !== document.getElementById('desktop')) return;
            isSelecting = true; startX = e.pageX; startY = e.pageY;
            const box = document.getElementById('selection-box');
            box.style.display = 'block'; box.style.left = startX+'px'; box.style.top = startY+'px';
            box.style.width = '0'; box.style.height = '0';
        }
        window.onmousemove = (e) => {
            if (!isSelecting) return;
            const box = document.getElementById('selection-box');
            box.style.width = Math.abs(e.pageX - startX) + 'px';
            box.style.height = Math.abs(e.pageY - startY) + 'px';
            box.style.left = Math.min(e.pageX, startX) + 'px';
            box.style.top = Math.min(e.pageY, startY) + 'px';
        };
        window.onmouseup = () => { isSelecting = false; document.getElementById('selection-box').style.display = 'none'; };

        // Bubbles
        const bc = document.getElementById('bubble-container');
        for(let i=0; i<12; i++) {
            const b = document.createElement('div'); b.className = 'bubble';
            const size = Math.random()*200+100; b.style.width=size+'px'; b.style.height=size+'px';
            b.style.left=Math.random()*100+'%'; b.style.top=Math.random()*100+'%';
            b.style.animationDelay=Math.random()*5+'s'; bc.appendChild(b);
        }
    </script>
</body>
</html>
