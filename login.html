<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS - Logowanie</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-icon {
            width: 100px;
            height: 100px;
            background: #555;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255,255,255,0.2);
            border-color: #3498db;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #3498db;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 13px;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="user-icon">👤</div>
        <h2>Zaloguj się</h2>
        
        <div class="input-group">
            <label for="username">Nazwa użytkownika</label>
            <input type="text" id="username" placeholder="Wpisz nazwę...">
        </div>

        <div class="input-group">
            <label for="password">Hasło</label>
            <input type="password" id="password" placeholder="Wpisz hasło...">
        </div>

        <button class="login-btn" onclick="login()">Zaloguj</button>
        
        <a href="index.html" class="back-link">Wróć do startu</a>
    </div>

    <script>
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user && pass) {
                alert('Witaj, ' + user + '! Logowanie udane (symulacja).');
            } else {
                alert('Proszę podać nazwę użytkownika i hasło.');
            }
        }
    </script>
</body>
</html>
