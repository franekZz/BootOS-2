<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS 2</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* TŁO Z BĄBELKAMI */
        #animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(2px);
            animation: float 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        .login-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .user-icon {
            width: 100px;
            height: 100px;
            background: #555;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255,255,255,0.2);
            border-color: #3498db;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #3498db;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover:not(:disabled) {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 13px;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div id="animation-background"></div>

    <div class="login-box">
        <div class="user-icon">👤</div>
        <h2>Konfiguracja konta</h2>
        <p style="font-size: 13px; color: #e74c3c; margin-bottom: 25px;">Wpisz nazwę, aby kontynuować</p>
        
        <div class="input-group">
            <label for="username">Podaj Nazwe</label>
            <input type="text" id="username" placeholder="Twoja nazwa..." oninput="validateInput()">
        </div>

        <div class="input-group">
            <label for="password">Ustal hasło Do systemu</label>
            <input type="password" id="password" placeholder="Twoje hasło...">
        </div>

        <button id="login-btn" class="login-btn" disabled onclick="login()">Wejdź do systemu</button>
        
        <a href="index.html" class="back-link">Wróć do startu</a>
    </div>

    <script>
        function validateInput() {
            const user = document.getElementById('username').value.trim();
            const btn = document.getElementById('login-btn');
            btn.disabled = user.length === 0;
        }

        // TWORZENIE BĄBELKÓW
        function createBubbles() {
            const screen = document.getElementById('animation-background');
            const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];
            
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const size = Math.random() * 60 + 20 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                bubble.style.animationDelay = Math.random() * 8 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                
                screen.appendChild(bubble);
            }
        }

        function login() {
            const user = document.getElementById('username').value.trim();
            // Przekierowanie do zarządzania dyskami bez alertu
            window.location.href = "dyski.html?user=" + encodeURIComponent(user);
        }

        // URUCHOM BĄBELKI
        window.onload = createBubbles;
    </script>
</body>
</html>
