<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootHypeOS - Welcome</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #9b59b6, #3498db);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            filter: blur(5px);
            animation: float 15s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-20vh) scale(2); opacity: 0; }
        }

        .welcome-container {
            text-align: center;
            animation: fadeIn 2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 80px;
            font-weight: 100;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        p {
            font-size: 24px;
            font-weight: 300;
            opacity: 0.8;
            margin-bottom: 50px;
        }

        .next-arrow {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            cursor: pointer;
            transition: 0.3s;
            margin: 0 auto;
            text-decoration: none;
            color: white;
        }

        .next-arrow:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div id="animation-background"></div>

    <div class="welcome-container">
        <h1>Welcome BootHypeOS</h1>
        <p>Your BootHypeOS experience starts now.</p>
        <a href="hypelogin.html" class="next-arrow">➔</a>
    </div>

    <script>
        function createBubbles() {
            const screen = document.getElementById('animation-background');
            const colors = ['#ffffff', '#ecf0f1', '#e0e0e0'];
            for (let i = 0; i < 20; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 100 + 50 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                bubble.style.animationDelay = Math.random() * 10 + 's';
                bubble.style.animationDuration = Math.random() * 10 + 10 + 's';
                screen.appendChild(bubble);
            }
        }
        window.onload = createBubbles;
    </script>
</body>
</html>
