<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS - Aktywacja Systemu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(2px);
            animation: float 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        .activation-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 600px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin-bottom: 30px; font-weight: 300; }

        .version-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .version-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .version-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
        }

        .version-card.selected {
            background: rgba(52, 152, 219, 0.2);
            border-color: #3498db;
        }

        .version-card h3 { margin: 0; color: #3498db; }
        .version-card p { font-size: 12px; color: #aaa; margin: 0; line-height: 1.4; }

        .key-input-container {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
            font-family: monospace;
            font-size: 18px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #3498db;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }

        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="animation-background"></div>

    <div class="activation-box">
        <h2>Wybierz wersję BootOS</h2>
        
        <div class="version-grid">
            <div class="version-card" onclick="selectVersion('Home', 'bootoshome1234')">
                <h3>Home</h3>
                <p>Do pracy i grania. Podstawowe funkcje dla każdego.</p>
            </div>
            <div class="version-card" onclick="selectVersion('Pro', 'bootospro1234')">
                <h3>Pro</h3>
                <p>Funkcje VM i najlepszy do grania. Dla profesjonalistów.</p>
            </div>
            <div class="version-card" onclick="selectVersion('ProAI', 'bootosproai1234')">
                <h3>ProAI</h3>
                <p>Najnowsze funkcje BootOS 2.0. Wszystko od razu (Alfa), Notatnik AI.</p>
            </div>
        </div>

        <div id="key-container" class="key-input-container">
            <p id="key-label">Wprowadź klucz dla wersji Home</p>
            <input type="text" id="product-key" placeholder="XXXX-XXXX-XXXX-XXXX" oninput="validateKey()">
            <div id="error-msg" class="error-msg">Niepoprawny klucz produktu!</div>
            <button id="activate-btn" class="btn" disabled onclick="activate()">Aktywuj i Kontynuuj</button>
        </div>
    </div>

    <script>
        let selectedVersion = '';
        let correctKey = '';

        function selectVersion(name, key) {
            selectedVersion = name;
            correctKey = key;

            document.querySelectorAll('.version-card').forEach(card => {
                card.classList.remove('selected');
                if (card.querySelector('h3').innerText === name) {
                    card.classList.add('selected');
                }
            });

            document.getElementById('key-container').style.display = 'block';
            document.getElementById('key-label').innerText = `Wprowadź klucz dla wersji BootOS ${name}`;
            document.getElementById('product-key').value = '';
            document.getElementById('activate-btn').disabled = true;
            document.getElementById('error-msg').style.display = 'none';
        }

        function validateKey() {
            const input = document.getElementById('product-key').value.toLowerCase();
            document.getElementById('activate-btn').disabled = input.length === 0;
            document.getElementById('error-msg').style.display = 'none';
        }

        function activate() {
            const input = document.getElementById('product-key').value.toLowerCase();
            if (input === correctKey) {
                localStorage.setItem('bootos_version', selectedVersion);
                // Przejście do dysków
                const urlParams = new URLSearchParams(window.location.search);
                const user = urlParams.get('user') || 'Użytkownik';
                window.location.href = `dyski.html?user=${encodeURIComponent(user)}`;
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function createBubbles() {
            const screen = document.getElementById('animation-background');
            const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 60 + 20 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                bubble.style.animationDelay = Math.random() * 8 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                screen.appendChild(bubble);
            }
        }

        window.onload = createBubbles;
    </script>
</body>
</html>
