<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS - Logowanie XimiAccount</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(2px);
            animation: float 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        .ximi-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            color: #3498db;
            font-weight: bold;
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
            outline: none;
            margin-top: 5px;
        }

        .ximi-btn {
            width: 100%;
            padding: 12px;
            background: #3498db;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .ximi-btn:hover {
            background: #2980b9;
        }

        .secondary-links {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .link {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }

        .link:hover {
            color: white;
        }

        /* Modal Potwierdzenia */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            border: 1px solid #333;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .yes-btn { background: #e74c3c; color: white; }
        .no-btn { background: #333; color: white; }
    </style>
</head>
<body>
    <div id="animation-background"></div>

    <div class="ximi-box">
        <div class="logo">X</div>
        <h2>Logowanie do Konta XimiAccount</h2>
        
        <div class="input-group">
            <input type="text" placeholder="Email lub Login">
        </div>
        <div class="input-group">
            <input type="password" placeholder="Hasło">
        </div>

        <button class="ximi-btn" onclick="goToDisks()">Zaloguj się</button>

        <div class="secondary-links">
            <span class="link" onclick="alert('Tworzenie konta...')">Utwórz konto</span>
            <span class="link" onclick="alert('Odzyskiwanie hasła...')">Nie pamiętam hasła</span>
            <span class="link" onclick="showSkipModal()">Pomiń</span>
        </div>
    </div>

    <div id="skipModal" class="modal">
        <div class="modal-content">
            <p>Czy na pewno chcesz pominąć? Nie będziesz miał funkcji Ximi.</p>
            <div class="modal-btns">
                <button class="modal-btn yes-btn" onclick="goToDisks()">Tak</button>
                <button class="modal-btn no-btn" onclick="hideSkipModal()">Nie</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user') || 'Użytkownik';
        const hasWifi = urlParams.get('wifi') === 'true';

        // Logika automatycznego pominięcia jeśli nie ma WiFi
        if (!hasWifi) {
            window.location.href = `dyski.html?user=${encodeURIComponent(username)}`;
        }

        function showSkipModal() {
            document.getElementById('skipModal').style.display = 'flex';
        }

        function hideSkipModal() {
            document.getElementById('skipModal').style.display = 'none';
        }

        function goToDisks() {
            window.location.href = `dyski.html?user=${encodeURIComponent(username)}`;
        }

        // TWORZENIE BĄBELKÓW
        function createBubbles() {
            const screen = document.getElementById('animation-background');
            const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];
            
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const size = Math.random() * 60 + 20 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                bubble.style.animationDelay = Math.random() * 8 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                
                screen.appendChild(bubble);
            }
        }

        window.onload = createBubbles;
    </script>
</body>
</html>
