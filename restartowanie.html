<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS - Restartowanie</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        /* TŁO Z BĄBELKAMI - ROZMAZANE I JASNE */
        #animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffffff, #e0e0e0);
            z-index: -1;
            overflow: hidden;
            filter: blur(8px);
            opacity: 0.8;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            20% { opacity: 0.4; }
            80% { opacity: 0.4; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* ELEMENTY INTERFEJSU */
        .content-box {
            text-align: center;
            z-index: 10;
        }

        /* Faza 1: Restartowanie */
        #restart-phase {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(0,0,0,0.1);
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Faza 2: Logo */
        #logo-phase {
            display: none;
            font-size: 72px;
            font-weight: bold;
            color: #3498db;
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease-in-out;
        }

        /* Faza 3: Witamy */
        #welcome-phase {
            display: none;
            animation: fadeIn 1.5s ease-in-out;
        }

        .welcome-text {
            font-size: 84px;
            font-weight: 300;
            margin-bottom: 40px;
            background: linear-gradient(45deg, #2c3e50, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #next-btn {
            padding: 15px 60px;
            font-size: 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3);
            transition: all 0.3s;
            font-weight: bold;
        }

        #next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(52, 152, 219, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="animation-background"></div>

    <div class="content-box">
        <!-- Faza 1 -->
        <div id="restart-phase">
            <div class="spinner"></div>
            <h2>Uruchamianie ponownie</h2>
        </div>

        <!-- Faza 2 -->
        <div id="logo-phase">BootOS</div>

        <!-- Faza 3 -->
        <div id="welcome-phase">
            <h1 class="welcome-text">Witamy</h1>
            <button id="next-btn" onclick="location.href='final.html'">Dalej</button>
        </div>
    </div>

    <script>
        // TWORZENIE BĄBELKÓW (Wersja jasna)
        function createBubbles() {
            const screen = document.getElementById('animation-background');
            const colors = ['#3498db', '#9b59b6', '#2ecc71', '#34495e', '#ecf0f1'];
            
            for (let i = 0; i < 25; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 100 + 40 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                bubble.style.animationDelay = Math.random() * 10 + 's';
                bubble.style.animationDuration = Math.random() * 8 + 7 + 's';
                screen.appendChild(bubble);
            }
        }

        // SEKWENCJA RESTARTU
        function runSequence() {
            const phase1 = document.getElementById('restart-phase');
            const phase2 = document.getElementById('logo-phase');
            const phase3 = document.getElementById('welcome-phase');

            // 1. Czekaj 3s na ekranie "Uruchamianie ponownie"
            setTimeout(() => {
                phase1.style.display = 'none';
                phase2.style.display = 'block';

                // 2. Czekaj 2s na Logo
                setTimeout(() => {
                    phase2.style.display = 'none';
                    phase3.style.display = 'block';
                }, 2000);

            }, 3000);
        }

        window.onload = () => {
            createBubbles();
            runSequence();
        };
    </script>
</body>
</html>
