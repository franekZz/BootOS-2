<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS - Połączenie WiFi</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        #animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: -1;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            filter: blur(2px);
            animation: float 8s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        .wifi-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 300;
        }

        .wifi-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            text-align: left;
        }

        .wifi-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .wifi-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .wifi-item.selected {
            background: rgba(52, 152, 219, 0.2);
            border-color: #3498db;
        }

        .wifi-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .wifi-icon {
            font-size: 20px;
        }

        .password-input-container {
            margin-top: 15px;
            display: none;
            text-align: left;
        }

        .password-input-container.active {
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
            box-sizing: border-box;
            outline: none;
            margin-top: 5px;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .next-btn {
            background: #3498db;
        }

        .next-btn:hover:not(:disabled) {
            background: #2980b9;
        }

        .next-btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }

        .skip-btn {
            background: rgba(255, 255, 255, 0.1);
        }

        .skip-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="animation-background"></div>

    <div class="wifi-box">
        <h2>Wybierz sieć WiFi</h2>
        <div class="wifi-list">
            <div class="wifi-item" onclick="selectWifi('Tomato', false)">
                <div class="wifi-info">
                    <span class="wifi-icon">📶</span>
                    <span>Tomato (WiFi sąsiada)</span>
                </div>
                <span>🔒</span>
            </div>
            <div class="wifi-item" onclick="selectWifi('XimiWifi', true, 'bootos')">
                <div class="wifi-info">
                    <span class="wifi-icon">📶</span>
                    <span>XimiWifi</span>
                </div>
                <span>🔒</span>
            </div>
            <div class="wifi-item" onclick="selectWifi('ProGamerWifi', true, 'pro')">
                <div class="wifi-info">
                    <span class="wifi-icon">📶</span>
                    <span>ProGamerWifi</span>
                </div>
                <span>🔒</span>
            </div>
        </div>

        <div id="password-container" class="password-input-container">
            <label id="password-label">Hasło dla </label>
            <input type="password" id="wifi-password" placeholder="Wpisz hasło..." oninput="validatePassword()">
            <div id="error-msg" class="error-msg">Niepoprawne hasło!</div>
        </div>

        <div class="btn-container">
            <button class="btn skip-btn" onclick="skipWifi()">Pomiń WiFi</button>
            <button id="next-btn" class="btn next-btn" disabled onclick="connect()">Połącz</button>
        </div>
    </div>

    <script>
        let selectedNetwork = null;
        let correctPassword = null;
        let needsPassword = false;

        // Pobieranie użytkownika z URL
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('user') || 'Użytkownik';

        function selectWifi(name, hasPassword, password) {
            selectedNetwork = name;
            needsPassword = hasPassword;
            correctPassword = password;

            // Update UI
            document.querySelectorAll('.wifi-item').forEach(item => {
                item.classList.remove('selected');
                if (item.innerText.includes(name)) {
                    item.classList.add('selected');
                }
            });

            const container = document.getElementById('password-container');
            const nextBtn = document.getElementById('next-btn');
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.style.display = 'none';
            document.getElementById('wifi-password').value = '';

            if (needsPassword) {
                container.classList.add('active');
                document.getElementById('password-label').innerText = 'Hasło dla ' + name;
                nextBtn.disabled = true;
            } else {
                // Tomato (no password specified by user, but has a lock icon)
                // Let's assume Tomato is locked but we don't have the password, 
                // or just for the sake of simulation, let's say it's "locked" and we can't connect.
                // Actually, user said "Tomato wifi sąsiada", I'll just make it require a password too 
                // but since user didn't give one, I'll make it impossible to connect or give it a dummy one.
                // Wait, user said: "są 3 wifi 1 Tomato wifi sąsiada XimiWifi moje hasło:bootos i ProGamerWifi hasło:pro"
                // This means only XimiWifi and ProGamerWifi have passwords. Tomato is just there.
                // I'll make Tomato selectable but "locked" without a password provided.
                container.classList.add('active');
                document.getElementById('password-label').innerText = 'Hasło dla ' + name;
                nextBtn.disabled = true;
                correctPassword = "brak"; // Just a dummy password
            }
        }

        function validatePassword() {
            const pwd = document.getElementById('wifi-password').value;
            const nextBtn = document.getElementById('next-btn');
            const errorMsg = document.getElementById('error-msg');
            
            errorMsg.style.display = 'none';
            nextBtn.disabled = pwd.length === 0;
        }

        function connect() {
            const pwd = document.getElementById('wifi-password').value;
            const errorMsg = document.getElementById('error-msg');

            if (pwd === correctPassword) {
                // Sukces
                window.location.href = `ximilogin.html?user=${encodeURIComponent(username)}&wifi=true`;
            } else {
                errorMsg.style.display = 'block';
            }
        }

        function skipWifi() {
            // Przejście do dyski.html z pominięciem ximilogin.html
            // User said: "a jak nie wybrałeś wifi to ximilogin.html zostaje pominięte"
            window.location.href = `dyski.html?user=${encodeURIComponent(username)}&wifi=false`;
        }

        // TWORZENIE BĄBELKÓW
        function createBubbles() {
            const screen = document.getElementById('animation-background');
            const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22'];
            
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const size = Math.random() * 60 + 20 + 'px';
                bubble.style.width = size;
                bubble.style.height = size;
                
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                bubble.style.animationDelay = Math.random() * 8 + 's';
                bubble.style.animationDuration = Math.random() * 5 + 5 + 's';
                
                screen.appendChild(bubble);
            }
        }

        window.onload = createBubbles;
    </script>
</body>
</html>
