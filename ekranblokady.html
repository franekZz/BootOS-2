<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BootOS - Ekran Blokady</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .lock-screen {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px;
            box-sizing: border-box;
            transition: transform 0.8s ease-in-out;
        }

        .lock-screen.up {
            transform: translateY(-100%);
        }

        .time-container {
            text-align: left;
        }

        #clock { font-size: 140px; font-weight: 100; margin: 0; }
        #date { font-size: 36px; font-weight: 300; margin-top: -10px; }

        .hint {
            text-align: center;
            font-size: 20px;
            animation: breathe 2s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* EKRAN LOGOWANIA */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
        }

        .login-screen.show {
            opacity: 1;
            pointer-events: all;
        }

        .user-avatar {
            width: 120px;
            height: 120px;
            background: #555;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            margin-bottom: 20px;
        }

        .username {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .password-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
            text-align: center;
            outline: none;
            font-size: 16px;
        }

        .login-btn {
            margin-top: 15px;
            padding: 8px 30px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .error-msg {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body onclick="unlock()" onkeydown="handleKey(event)">
    
    <div class="lock-screen" id="lock-screen">
        <div class="time-container">
            <h1 id="clock">00:00</h1>
            <p id="date">Wczytywanie...</p>
        </div>
        <div class="hint">Naciśnij dowolny klawisz lub kliknij, aby odblokować</div>
    </div>

    <div class="login-screen" id="login-screen">
        <div class="user-avatar">👤</div>
        <div class="username" id="display-user">Użytkownik</div>
        
        <div class="password-box" id="pwd-container">
            <input type="password" id="pwd-input" placeholder="Hasło" autofocus>
            <button class="login-btn" onclick="checkPassword()">Zaloguj</button>
            <div id="error" class="error-msg">Niepoprawne hasło</div>
        </div>
    </div>

    <script>
        const savedUser = localStorage.getItem('bootos_user') || 'Użytkownik';
        const savedPass = localStorage.getItem('bootos_pass') || '';
        
        document.getElementById('display-user').innerText = savedUser;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
            
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').innerText = now.toLocaleDateString('pl-PL', options);
        }

        function unlock() {
            const lock = document.getElementById('lock-screen');
            const login = document.getElementById('login-screen');
            
            lock.classList.add('up');
            login.classList.add('show');
            
            if (savedPass === '') {
                // Brak hasła -> od razu na pulpit
                setTimeout(() => {
                    window.location.href = "pulpit.html";
                }, 500);
            } else {
                document.getElementById('pwd-input').focus();
            }
        }

        function handleKey(e) {
            if (!document.getElementById('lock-screen').classList.contains('up')) {
                unlock();
            } else if (e.key === "Enter") {
                checkPassword();
            }
        }

        function checkPassword() {
            const input = document.getElementById('pwd-input').value;
            const error = document.getElementById('error');
            
            if (input === savedPass) {
                window.location.href = "pulpit.html";
            } else {
                error.style.display = 'block';
                document.getElementById('pwd-input').value = '';
                document.getElementById('pwd-input').focus();
            }
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
